; Alembic configuration for Pyjobkit SQL backend.
;
; The 'pyjobkit-migrate' console script ships this file along with the
; migrations directory, so callers only need to point sqlalchemy.url at
; their database (via --dsn or PYJOBKIT_DSN).

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
timezone = UTC
sqlalchemy.url = sqlite:///pyjobkit.db
file_template = %%(year)d%%(month).2d%%(day).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
