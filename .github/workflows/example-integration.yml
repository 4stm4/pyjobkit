# Example CI workflow that exercises Pyjobkit end-to-end (#70).
#
# Copy this file into your own repository and adjust the install /
# integration step to match your project layout. It demonstrates the
# minimum recipe: spin up an in-memory worker, enqueue a job, wait for
# it to finish, and fail the run if the result is wrong.

name: pyjobkit integration example

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install pyjobkit
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run integration script
        run: python examples/ci_integration.py
