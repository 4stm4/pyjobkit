# Run the SQL backend tests against a real Postgres instance.
#
# The default pytest run uses SQLite via sqlalchemy_test_url fallback,
# so production-only behaviour (SKIP LOCKED, advisory locks, JSONB
# nuances) is not exercised. This workflow boots a Postgres service
# alongside Python and re-runs the suite with PYJOBKIT_TEST_DSN set.

name: postgres integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: endsWith(github.repository, '/pyjobkit')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: pyjobkit
          POSTGRES_DB: pyjobkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PYJOBKIT_TEST_DSN: postgresql+asyncpg://postgres:pyjobkit@localhost:5432/pyjobkit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies (with Postgres extras)
        run: |
          python -m pip install --upgrade pip
          pip install .[pg]
          pip install pytest psycopg2-binary alembic
      - name: Apply migrations
        run: pyjobkit-migrate --dsn "$PYJOBKIT_TEST_DSN" up
      - name: Run integration / backend tests
        run: |
          pytest tests/test_sql_backend.py tests/integration -v
