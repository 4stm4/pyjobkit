site_name: Pyjobkit
site_description: Backend-agnostic job processing toolkit for Python
site_url: https://4stm4.github.io/pyjobkit/
repo_url: https://github.com/4stm4/pyjobkit
repo_name: 4stm4/pyjobkit

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Production deployment: production.md
  - Cancellation: cancellation.md
  - Components:
    - Overview: components/index.md
    - Engine: components/engine.md
    - Worker: components/worker.md
    - Backends: components/backends.md
    - Executors: components/executors.md
    - Retry policies: components/retry.md
    - Scheduler: components/scheduler.md
    - Leader election: components/leader.md
    - Webhooks: components/webhooks.md
    - Rate limiting: components/ratelimit.md
    - Logging: components/logging.md
    - Tracing: components/tracing.md
    - Metrics: components/metrics.md
    - Types: components/types.md
    - CLI tools: components/cli.md
    - FastAPI integration: components/fastapi.md
  - Extending Pyjobkit: extending.md
  - API reference: api.md
  - Stability policy: stability.md
  - FAQ: faq.md
  - Comparison: comparison.md
  - Release notes:
    - 1.0 announcement: release-1.0.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
