site_name: Pyjobkit
site_description: Backend-agnostic job processing toolkit for Python
site_url: https://4stm4.github.io/pyjobkit/
repo_url: https://github.com/4stm4/pyjobkit
repo_name: 4stm4/pyjobkit

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Extending Pyjobkit: extending.md
  - API reference: api.md
  - FAQ: faq.md
  - Comparison: comparison.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
